services:
  - type: web
    name: wolf-squadron-api
    env: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://wolf-squadron.onrender.com
      - key: PORT
        value: 3001

  - type: static
    name: wolf-squadron
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://wolf-squadron-api.onrender.com
